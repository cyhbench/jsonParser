<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Parser</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; background: #0f172a; color: #e2e8f0; }
  h1 { font-size: 1.25rem; margin: 0 0 12px; }
  textarea { width: 100%; height: 40vh; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; padding: 12px; font-family: monospace; font-size: 14px; resize: vertical; }
  button { display: inline-block; margin-top: 12px; padding: 10px 20px; border: none; border-radius: 8px; background: #3b82f6; color: white; font-size: 1rem; cursor: pointer; }
  button:active { background: #2563eb; }
  #result { margin-top: 16px; white-space: pre-wrap; word-break: break-all; border-radius: 8px; background: #1e293b; border: 1px solid #334155; padding: 12px; font-family: monospace; font-size: 14px; max-height: 50vh; overflow-y: auto; }
  .error { color: #f87171; border-color: #f87171; }
  .success { color: #86efac; border-color: #22c55e; }
</style>
</head>
<body>
  <h1>JSON Parser</h1>
  <textarea id="input" placeholder="在此貼上 JSON 內容..."></textarea>
  <button id="parseBtn">解析</button>
  <div id="result"></div>

<script>
  const input = document.getElementById('input');
  const result = document.getElementById('result');
  const btn = document.getElementById('parseBtn');

  function formatJSON(obj, indent = 2) {
    return JSON.stringify(obj, null, indent);
  }

  btn.addEventListener('click', () => {
    const txt = input.value.trim();
    result.className = '';
    result.textContent = '';
    if (!txt) return;
    try {
      const parsed = JSON.parse(txt);
      result.textContent = formatJSON(parsed);
      result.classList.add('success');
    } catch (e) {
      result.textContent = '❌ 解析失敗：' + e.message;
      result.classList.add('error');
    }
  });

  // 支援 Ctrl+Enter 快捷鍵
  input.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      btn.click();
    }
  });
</script>
</body>
</html>
